<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Соль — CRM вокальной студии SA Music Lab</title>
<meta name="description" content="Соль — кабинет педагога по вокалу: расписание, ученики, абонементы, оплаты и напоминания.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='7' fill='%23C97A10'/%3E%3Cg stroke='%23C97A10' stroke-width='2.4' stroke-linecap='round'%3E%3Cpath d='M16 2v4M16 26v4M2 16h4M26 16h4M6.1 6.1l2.8 2.8M23.1 23.1l2.8 2.8M25.9 6.1l-2.8 2.8M8.9 23.1l-2.8 2.8'/%3E%3C/g%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Prata&family=Golos+Text:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/app.css">
</head>
<body>

<div class="app" id="app">

  <!-- ═══════════ Sidebar ═══════════ -->
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <span class="brand-sun" aria-hidden="true">
        <svg viewBox="0 0 40 40" width="40" height="40">
          <g class="sun-rays" stroke="currentColor" stroke-width="2.6" stroke-linecap="round">
            <path d="M20 3v5M20 32v5M3 20h5M32 20h5M8 8l3.5 3.5M28.5 28.5L32 32M32 8l-3.5 3.5M11.5 28.5L8 32"/>
          </g>
          <circle class="sun-core" cx="20" cy="20" r="8.5" fill="currentColor"/>
        </svg>
      </span>
      <span class="brand-text">
        <b>Соль</b>
        <small>SA Music Lab</small>
      </span>
    </div>

    <nav class="nav" id="nav">
      <a href="#/dashboard" data-route="dashboard" class="nav-link">
        <svg viewBox="0 0 20 20"><path d="M3 10.4 10 3l7 7.4M5 8.8V17h4v-4.4h2V17h4V8.8" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Обзор
      </a>
      <a href="#/calendar" data-route="calendar" class="nav-link">
        <svg viewBox="0 0 20 20"><rect x="3" y="4.5" width="14" height="12.5" rx="2.5" fill="none" stroke="currentColor" stroke-width="1.7"/><path d="M3 8.5h14M7 2.8v3M13 2.8v3" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
        Календарь
      </a>
      <a href="#/students" data-route="students" class="nav-link">
        <svg viewBox="0 0 20 20"><circle cx="7.5" cy="7" r="3.2" fill="none" stroke="currentColor" stroke-width="1.7"/><path d="M2.5 17c.6-3 2.6-4.6 5-4.6s4.4 1.6 5 4.6" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><path d="M13.4 4.6a3.2 3.2 0 0 1 0 4.8M15.2 12.6c1.4.8 2.2 2.3 2.5 4.4" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
        Ученики
      </a>
      <a href="#/finance" data-route="finance" class="nav-link">
        <svg viewBox="0 0 20 20"><path d="M3.5 16.5V11M8 16.5V7.5M12.5 16.5v-6M17 16.5V4.5" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/></svg>
        Финансы
      </a>
      <a href="#/reminders" data-route="reminders" class="nav-link">
        <svg viewBox="0 0 20 20"><path d="M10 3a5 5 0 0 0-5 5v3.2l-1.4 2.6c-.3.6.1 1.2.7 1.2h11.4c.6 0 1-.6.7-1.2L15 11.2V8a5 5 0 0 0-5-5ZM8.3 17.4a1.8 1.8 0 0 0 3.4 0" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Напоминания
        <span class="nav-badge" id="reminders-badge" hidden></span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <a href="#/settings" data-route="settings" class="nav-link">
        <svg viewBox="0 0 20 20"><circle cx="10" cy="10" r="2.6" fill="none" stroke="currentColor" stroke-width="1.7"/><path d="M10 2.8v2M10 15.2v2M2.8 10h2M15.2 10h2M4.9 4.9l1.4 1.4M13.7 13.7l1.4 1.4M15.1 4.9l-1.4 1.4M6.3 13.7l-1.4 1.4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
        Настройки
      </a>
      <div class="sidebar-user">
        <span class="avatar avatar-owner">А</span>
        <span class="sidebar-user-text"><b>Анастасия</b><small>педагог по вокалу</small></span>
      </div>
    </div>
  </aside>

  <!-- ═══════════ Main ═══════════ -->
  <main class="main">
    <header class="topbar">
      <button class="burger" id="burger" aria-label="Меню">
        <svg viewBox="0 0 20 20"><path d="M3 5.5h14M3 10h14M3 14.5h14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      </button>
      <div class="topbar-title">
        <h1 id="view-title">Обзор</h1>
        <p id="view-subtitle" class="topbar-sub"></p>
      </div>
      <div class="topbar-actions">
        <button class="btn btn-ghost" id="btn-add-student">
          <svg viewBox="0 0 20 20"><circle cx="8" cy="7" r="3.2" fill="none" stroke="currentColor" stroke-width="1.7"/><path d="M2.8 17c.6-3 2.7-4.6 5.2-4.6 1.2 0 2.3.4 3.2 1M15 12.5v5M12.5 15h5" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
          Ученик
        </button>
        <button class="btn btn-primary" id="btn-add-lesson">
          <svg viewBox="0 0 20 20"><path d="M10 4.5v11M4.5 10h11" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          Занятие
        </button>
      </div>
    </header>

    <div class="view" id="view" tabindex="-1"></div>
  </main>
</div>

<!-- Слои: модалки, поповеры, тосты -->
<div class="modal-layer" id="modal-layer" hidden></div>
<div class="popover-layer" id="popover-layer"></div>
<div class="toast-stack" id="toast-stack" aria-live="polite"></div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
